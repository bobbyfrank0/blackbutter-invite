<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Which should we pick?</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:
radial-gradient(circle,#081426,#01050d);

color:white;

padding:20px;

overflow-x:hidden;

}

h1{

text-align:center;

font-size:
clamp(
42px,
8vw,
82px
);

text-shadow:
0 0 30px white;

margin-bottom:10px;

}

.subtitle{

text-align:center;

font-size:
clamp(
18px,
3vw,
28px
);

margin-bottom:30px;

}

.wrapper{

display:grid;

grid-template-columns:
520px 1fr;

gap:30px;

max-width:1400px;

margin:auto;

}

.left{

text-align:center;

}

.pie{

width:
min(
90vw,
520px
);

aspect-ratio:1;

border-radius:50%;

overflow:hidden;

display:grid;

grid-template-columns:
1fr 1fr;

grid-template-rows:
1fr 1fr;

border:
5px solid white;

box-shadow:
0 0 35px white;

background:black;

}
.pie img{

width:100%;
height:100%;

/* keep whole logo visible */
object-fit:contain;

/* dead center */
object-position:center center;

/* make all 4 feel equal */
transform:scale(.98);

/* bring closer together */
padding:1px;

/* dark background */
background:#020813;

display:block;

box-sizing:border-box;

}
.voteText{

font-size:30px;

margin-top:20px;

}

.card{

display:grid;

grid-template-columns:
220px 1fr;

gap:20px;

padding:18px;

margin-bottom:24px;

background:#09121d;

border-radius:28px;

border:
2px solid var(--c);

box-shadow:
0 0 25px var(--c);

}

.mainImage{

width:220px;

height:160px;

object-fit:cover;

border-radius:18px;

}

.card h2{

font-size:34px;

color:var(--c);

}

.card p{

font-size:18px;

line-height:1.45;

margin-top:10px;

color:#dce5f1;

}

summary{

cursor:pointer;

font-size:20px;

font-weight:bold;

color:var(--c);

margin-top:14px;

}

.gallery{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:10px;

margin-top:14px;

}

.gallery img{

width:100%;

height:170px;

object-fit:contain;

background:#050912;

padding:4px;

border-radius:14px;

border:
1px solid var(--c);

}

button{

margin-top:18px;

padding:
18px 36px;

font-size:22px;

font-weight:bold;

background:var(--c);

color:white;

border:none;

border-radius:20px;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:scale(1.04);

}

.modal{

display:none;

position:fixed;

inset:0;

background:
rgba(
0,
0,
0,
.92
);

justify-content:center;

align-items:center;

padding:20px;

}

.show{

display:flex;

}

.resultBox{

background:#08111d;

padding:30px;

border-radius:30px;

width:900px;

max-width:95vw;

}

.resultPie{

width:
min(
80vw,
420px
);

aspect-ratio:1;

display:grid;

grid-template-columns:
1fr 1fr;

grid-template-rows:
1fr 1fr;

overflow:hidden;

border-radius:50%;

margin:auto;

}

.slice{

position:relative;

}

.slice img{

width:100%;

height:100%;

object-fit:cover;

}

.percent{

position:absolute;

inset:0;

display:flex;

justify-content:center;

align-items:center;

font-size:34px;

font-weight:bold;

}

.row{

margin-top:10px;

font-size:22px;

}

@media(max-width:900px){

body{
padding:12px;
}

h1{
font-size:clamp(34px,11vw,54px);
line-height:1.05;
padding:0 8px;
margin-bottom:8px;
}

.subtitle{
font-size:clamp(17px,5vw,24px);
margin-bottom:20px;
}

.wrapper{
grid-template-columns:1fr;
gap:22px;
}

.left{
order:1;
}

#cards{
order:2;
}

.pie{
width:min(88vw,430px);
margin:auto;
}

.voteText{
font-size:24px;
margin-top:12px;
margin-bottom:8px;
}

.card{
grid-template-columns:1fr;
padding:16px;
gap:14px;
width:100%;
max-width:680px;
margin-left:auto;
margin-right:auto;
}

.mainImage{
width:100%;
height:190px;
object-fit:contain;
background:#050912;
padding:4px;
}

.card h2{
font-size:30px;
}

.card p{
font-size:16px;
line-height:1.4;
}

summary{
font-size:18px;
}

.gallery{
grid-template-columns:1fr 1fr;
gap:8px;
}

.gallery img{
height:125px;
}

button{
width:100%;
font-size:21px;
padding:16px;
}

.resultBox{
padding:20px;
width:95vw;
}

.resultPie{
width:min(82vw,330px);
}

.row{
font-size:18px;
}

.percent{
font-size:28px;
}

}

@media(max-width:430px){

h1{
font-size:38px;
}

.pie{
width:92vw;
}

.mainImage{
height:165px;
}

.card h2{
font-size:26px;
}

.gallery img{
height:105px;
}

button{
font-size:19px;
}

}

</style>

</head>

<body>

<h1>

What should Blackbutter select?

</h1>

<div class="subtitle">

Click an option to vote!

</div>

<div class="wrapper">

<div class="left">

<div class="pie">

<img src="images/mi-combat.png">

<img src="images/cj-barrymores.png">

<img src="images/ifly.png">

<img src="images/sandbox-vr.png">

</div>

<div class="voteText">

<span id="votes">

0

</span>

votes so far

</div>

</div>

<div id="cards">

</div>

</div>

<div id="modal" class="modal">

<div class="resultBox">

<h2>

Thanks for voting!

</h2>

<br>

<div id="pie2" class="resultPie">

</div>

<br>

<div id="rows">

</div>

<br>

<button onclick="closeResults()">

Close

</button>

</div>

</div>

<script>

const items=[

{

name:"MI Combat",

img:"images/mi-combat.png",

gallery:[

"images/mi-combat.png",

"images/mi-combat2.png",

"images/mi-combat3.png",

"images/mi-combat4.png"

],

desc:"Closest thing to playing Call of Duty in real life. You gear up with realistic-looking tactical laser equipment, split into teams, communicate, push objectives, and try to outplay the other side. Feels way more immersive than regular laser tag and gets competitive fast.",

color:"#ff5b5b",

votes:0

},

{

name:"CJ Barrymore's",

img:"images/cj-barrymores.png",

gallery:[

"images/cj-barrymores.png",

"images/cj2.png",

"images/cj3.png",

"images/cj4.png"

],

desc:"A huge entertainment place with go-karts, rides, arcade games, mini golf, food, and a bunch of different things to do.",

color:"#3d8fff",

votes:0

},

{

name:"iFLY Detroit",

img:"images/ifly.png",

gallery:[

"images/ifly.png",

"images/ifly2.png",

"images/ifly3.png",

"images/ifly4.png"

],

desc:"Indoor skydiving inside a giant wind tunnel where you actually float in the air.",

color:"#52ff72",

votes:0

},

{

name:"Sandbox VR",

img:"images/sandbox-vr.png",

gallery:[

"images/sandbox-vr.png",

"images/sandbox2.png",

"images/sandbox3.png",

"images/sandbox4.png"

],

desc:"Full-body VR where the whole group becomes part of the game and completes missions together.",

color:"#b56dff",

votes:0

}

];

function render(){

cards.innerHTML="";

items.forEach((x,i)=>{

cards.innerHTML+=`

<div
class="card"
style="--c:${x.color}">

<img
class="mainImage"
src="${x.img}">

<div>

<h2>

${x.name}

</h2>

<p>

${x.desc}

</p>

<details>

<summary>

▼ More pictures ▼

</summary>

<div class="gallery">

${x.gallery.map(
g=>

`<img src="${g}">`

).join("")}

</div>

</details>

<button
onclick="vote(${i})">

Select Event

</button>

</div>

</div>

`;

});

}

function vote(i){

items[i].votes++;

votes.innerText=

items.reduce(
(a,b)=>
a+b.votes,
0
);

modal.classList.add(
"show"
);

}

function closeResults(){

modal.classList.remove(
"show"
);

}

render();

</script>

</body>

</html>
