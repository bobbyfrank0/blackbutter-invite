<!DOCTYPE html>

<html>

<head>

<title>

Invitation

</title>

<style>

body{

margin:0;

background:black;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

video{

position:fixed;

top:0;

left:0;

/* fill phone screens */
width:100vw;

height:100vh;

/* adapt to portrait and landscape */
object-fit:contain;

/* clean edges */
background:black;

/* prevent weird scrolling */
overflow:hidden;

}

}

</style>

</head>

<body>

<video

id="intro"

autoplay

playsinline

controls

controlsList="nodownload"

disablePictureInPicture>
<source
src="intro.mp4"
type="video/mp4">

</video>

<script>

let v=document.getElementById("intro")

v.onended=()=>{

location.href="vote.html"

}

</script>

</body>

</html>
