<!DOCTYPE html>
<html>
<head>
<title>Invitation</title>

<style>

body{
margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
linear-gradient(
135deg,
#020617,
#031329,
#001f3f
);

color:white;

font-family:Arial;
}

h1{

font-size:60px;

text-align:center;

margin-bottom:20px;

text-shadow:
0 0 25px white;

}

p{

font-size:28px;

opacity:.9;

margin-bottom:60px;

}

button{

padding:

24px
90px;

font-size:34px;

border:none;

border-radius:20px;

cursor:pointer;

background:

linear-gradient(
90deg,
#ff4d4d,
#ff6a6a
);

color:white;

box-shadow:
0 0 40px red;

}

button:hover{

transform:scale(1.08);

}

</style>

</head>

<body>

<h1>
You've Been Invited To Celebrate 🎉
</h1>

<p>
Click below to open your invitation
</p>

<button onclick="location.href='video.html'">

Accept

</button>

</body>
</html>
